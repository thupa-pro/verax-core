name: Axiom Protocol Compliance Gate

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/axiom-core/src/**'
      - 'crates/axiom-cli/src/**'
      - 'crates/axiom-core-ffi/src/**'
      - 'crates/axiom-core-python/src/**'
      - 'crates/axiom-core-node/src/**'
      - 'crates/axiom-core-go/**'
      - 'scripts/**'
      - 'test-vectors/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /tmp/cargo-target

jobs:
  compliance:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain (stable)
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

# ═══════════════════════════════════════════════════════════════════
# STAGE 1 — Canonical CBOR Lint
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 1/6 — Canonical CBOR Lint: Rust deterministic encoding tests'
        run: |
          cargo test --release -p axiom-core -- cbor::tests::test_deterministic_encoding 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_null_bytes 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_float 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_tags 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_indefinite_length 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_tagged_values_inner 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_rejects_bytewise_unsorted_keys 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_fuzz_rejects_non_canonical_uint 2>&1
          cargo test --release -p axiom-core -- cbor::tests::test_fuzz_rejects_duplicate_keys 2>&1
        shell: bash

      - name: 'STAGE 1/6 — Canonical CBOR Lint: independent Python spec (11 rules)'
        run: python3 scripts/differential_cbor_test.py

      - name: 'STAGE 1/6 — Canonical CBOR Lint: fuzz decode never panics'
        run: cargo test --release -p axiom-core -- cbor::tests::test_fuzz_decode_never_panics 2>&1

# ═══════════════════════════════════════════════════════════════════
# STAGE 2 — Test Vector Oracle
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 2/6 — Test Vector Oracle: regenerate conformance vectors'
        run: python3 scripts/gen_conformance.py

      - name: 'STAGE 2/6 — Test Vector Oracle: conformance_suite_verification'
        run: cargo test --release -p axiom-core -- conformance_suite_verification 2>&1

      - name: 'STAGE 2/6 — Test Vector Oracle: payload decode valid vectors'
        run: cargo test --release -p axiom-core -- conformance_suite_payload_decode_valid_vectors 2>&1

      - name: 'STAGE 2/6 — Test Vector Oracle: fuzz roundtrip 10k random payloads'
        run: cargo test --release -p axiom-core -- cbor::tests::test_fuzz_roundtrip_random_payloads 2>&1

# ═══════════════════════════════════════════════════════════════════
# STAGE 3 — Negative Test Matrix
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 3/6 — Negative Test Matrix: full workspace test suite'
        run: cargo test --release --workspace 2>&1

      - name: 'STAGE 3/6 — Negative Test Matrix: integration use-case tests'
        run: cargo test --release -p axiom-core --test axiom_use_cases 2>&1

# ═══════════════════════════════════════════════════════════════════
# STAGE 4 — C FFI ABI Check
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 4/6 — C FFI ABI Check: build shared library'
        run: cargo build --release -p axiom-core-ffi 2>&1

      - name: 'STAGE 4/6 — C FFI ABI Check: verify exported symbols match header'
        run: bash scripts/check_ffi_abi.sh "$CARGO_TARGET_DIR/release/libaxiom_core_ffi.so"

      - name: 'STAGE 4/6 — C FFI ABI Check: version string test'
        run: |
          c_args="-I crates/axiom-core-ffi/include"
          ld_flags="-L $CARGO_TARGET_DIR/release -laxiom_core_ffi -lm -ldl"
          cat > /tmp/test_version.c << 'EOF'
          #include <stdio.h>
          #include "axiom_core.h"
          int main() {
              printf("axiom-core version: %s\n", axiom_version());
              return 0;
          }
          EOF
          gcc -o /tmp/test_version /tmp/test_version.c $c_args $ld_flags
          LD_LIBRARY_PATH="$CARGO_TARGET_DIR/release:$LD_LIBRARY_PATH" /tmp/test_version

# ═══════════════════════════════════════════════════════════════════
# STAGE 5 — Cross-language Round-trip
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 5/6 — Cross-language Round-trip: Go tests'
        run: |
          export CGO_LDFLAGS="-L$CARGO_TARGET_DIR/release -laxiom_core_ffi -lm -ldl"
          export CGO_CFLAGS="-I $(pwd)/crates/axiom-core-ffi/include"
          export LD_LIBRARY_PATH="$CARGO_TARGET_DIR/release:$LD_LIBRARY_PATH"
          cd crates/axiom-core-go && go test -v ./... 2>&1

      - name: 'STAGE 5/6 — Cross-language Round-trip: Python CBOR conformance'
        run: |
          export LD_LIBRARY_PATH="$CARGO_TARGET_DIR/release:$LD_LIBRARY_PATH"
          python3 scripts/differential_cbor_test.py

      - name: 'STAGE 5/6 — Cross-language Round-trip: build Python binding'
        run: cargo build --release -p axiom-core-python 2>&1

      - name: 'STAGE 5/6 — Cross-language Round-trip: build Node.js binding'
        run: |
          cd crates/axiom-core-node
          npm install 2>&1
          npm run build 2>&1
          ls -la *.node

      - name: 'STAGE 5/6 — Cross-language Round-trip: Node.js tests'
        run: |
          cd crates/axiom-core-node
          LD_LIBRARY_PATH="$CARGO_TARGET_DIR/release:$LD_LIBRARY_PATH" node test.js 2>&1

# ═══════════════════════════════════════════════════════════════════
# STAGE 6 — Composite Signature Validation
# ═══════════════════════════════════════════════════════════════════
      - name: 'STAGE 6/6 — Composite Sig: build CLI'
        run: cargo build --release -p axiom-cli 2>&1

      - name: 'STAGE 6/6 — Composite Sig: Ed25519 sign/verify chain'
        run: |
          CLI="$CARGO_TARGET_DIR/release/axiom"
          cd /tmp
          mkdir -p ci-comp-test && cd ci-comp-test
          echo "Composite CI test artifact" > artifact.txt
          $CLI init
          $CLI key generate test-key
          $CLI hash artifact.txt --json
          $CLI sign artifact.txt --key .axiom/keys/test-key.key --out test.axm
          PUBKEY=$(grep public .axiom/keys/test-key.key | cut -d' ' -f3)
          $CLI verify test.axm --pubkey "$PUBKEY"
          $CLI inspect test.axm
          $CLI lint test.axm

      - name: 'STAGE 6/6 — Composite Sig: composite sign with ML-DSA-65'
        run: |
          CLI="$CARGO_TARGET_DIR/release/axiom"
          cd /tmp/ci-comp-test
          $CLI key generate ed-key
          $CLI sign artifact.txt --key .axiom/keys/ed-key.key \
            --composite \
            --ml-dsa-key .axiom/keys/ed-key.mldsa \
            --out composite.axm
          echo "Composite signature created: composite.axm"
          $CLI inspect composite.axm
          ED_PUBKEY=$(grep public .axiom/keys/ed-key.key | cut -d' ' -f3)
          ML_PUBKEY=$(grep public .axiom/keys/ed-key.mldsa | cut -d' ' -f3)
          $CLI verify composite.axm --pubkey "$ED_PUBKEY" --mldsa-pubkey "$ML_PUBKEY"
          echo "Composite signature chain PASS"

      - name: 'STAGE 6/6 — Composite Sig: composite test vectors from conformance suite'
        run: |
          cargo test --release -p axiom-core -- conformance_suite_verification 2>&1

      - name: 'STAGE 6/6 — Composite Sig: CLI built-in test suite'
        run: |
          $CARGO_TARGET_DIR/release/axiom test 2>&1
          $CARGO_TARGET_DIR/release/axiom doctor 2>&1

      - name: 'STAGE 6/6 — Benchmark regression guard'
        run: bash scripts/check_benchmark_regression.sh "$CARGO_TARGET_DIR/release/axiom"

# ═══════════════════════════════════════════════════════════════════
# CARGO-DENY — Dependency Vulnerability Audit
# ═══════════════════════════════════════════════════════════════════
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo-deny check (advisories + licenses + bans)
        run: cargo deny check

# ═══════════════════════════════════════════════════════════════════
# COMPLIANCE REPORT
# ═══════════════════════════════════════════════════════════════════
      - name: Generate Compliance Report
        if: always()
        run: |
          STATUS="${{ job.status }}"
          cat > /tmp/compliance-report.json << EOF
          {
            "axiom_protocol": "v3.0",
            "compliance_gate": "Axiom-True v1.0",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sha": "${{ github.sha }}",
            "run_id": ${{ github.run_id }},
            "status": "$STATUS",
            "stages": {
              "1_cbor_lint": { "name": "Canonical CBOR Lint" },
              "2_test_vector_oracle": { "name": "Test Vector Oracle" },
              "3_negative_test_matrix": { "name": "Negative Test Matrix" },
              "4_c_ffi_abi_check": { "name": "C FFI ABI Check" },
              "5_cross_language_roundtrip": { "name": "Cross-language Round-trip" },
              "6_composite_signature": { "name": "Composite Signature Validation" },
              "7_benchmark_regression": { "name": "Benchmark Regression Guard" },
              "8_cargo_deny": { "name": "cargo-deny Vulnerability Audit" }
            },
            "gates": {
              "kani_proofs": "12 harnesses across cbor.rs + verify.rs",
              "fuzzing": "CBOR decode + COSE parse via cargo-fuzz"
            }
          }
          EOF
          echo "Compliance report generated:"
          python3 -m json.tool /tmp/compliance-report.json

      - name: Summarize compliance gate
        run: |
          echo "# Axiom Protocol Compliance Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1/6 Canonical CBOR Lint | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 2/6 Test Vector Oracle | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 3/6 Negative Test Matrix | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 4/6 C FFI ABI Check | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 5/6 Cross-language Round-trip | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| 6/6 Composite Signature | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| — Benchmark Regression | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| — cargo-deny Audit | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
          echo "| — Kani Proofs (12) | ⏳ separate job |" >> $GITHUB_STEP_SUMMARY
          echo "| — Fuzzing (2 targets) | ⏳ separate job |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Axiom-True v1.0** — All gates passed for commit \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  kani-proofs:
    needs: compliance
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust nightly for Kani
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          target: x86_64-unknown-linux-gnu

      - name: Install Kani verifier
        uses: model-checking/kani-github-action@v1
        with:
          working-directory: crates/axiom-core

      - name: Run Kani proofs
        run: cargo kani --harness check_cbor_roundtrip_minimal -p axiom-core 2>&1
        working-directory: crates/axiom-core

      - name: Run all Kani proof harnesses
        run: cargo kani -p axiom-core 2>&1
        working-directory: crates/axiom-core

  fuzzing:
    needs: compliance
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libclang-dev libssl-dev pkg-config clang

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz CBOR decode (1 min)
        run: cargo fuzz run fuzz_cbor_decode -- -max_total_time=60 -runs=50000
        working-directory: fuzz

      - name: Fuzz COSE parse (1 min)
        run: cargo fuzz run fuzz_cose_parse -- -max_total_time=60 -runs=50000
        working-directory: fuzz
