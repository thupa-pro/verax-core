name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /tmp/cargo-target

jobs:
  rust-build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Build all crates
        run: cargo build --release --workspace

      - name: Run Rust tests
        run: cargo test --release --workspace

      - name: Clippy
        run: cargo clippy --release --workspace -- -D warnings

  go-bindings:
    runs-on: ubuntu-22.04
    needs: rust-build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build FFI shared library
        run: cargo build --release -p axiom-core-ffi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Copy shared library for Go
        run: |
          mkdir -p /tmp/axiom-go-fresh
          cp $CARGO_TARGET_DIR/release/libaxiom_core_ffi.so /tmp/axiom-go-fresh/
          cp crates/axiom-core-ffi/include/axiom_core.h /tmp/axiom-go-fresh/

      - name: Run Go tests
        run: |
          export CGO_LDFLAGS="-L/tmp/axiom-go-fresh -laxiom_core_ffi -lm -ldl"
          export CGO_CFLAGS="-I/tmp/axiom-go-fresh"
          export LD_LIBRARY_PATH="/tmp/axiom-go-fresh:$LD_LIBRARY_PATH"
          cd crates/axiom-core-go && go test -v ./...

  cli-tests:
    runs-on: ubuntu-22.04
    needs: rust-build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build CLI
        run: cargo build --release -p axiom-cli

      - name: Test CLI help and version
        run: |
          $CARGO_TARGET_DIR/release/axiom --help
          $CARGO_TARGET_DIR/release/axiom version

      - name: Test CLI init, key, sign, verify chain
        run: |
          cd /tmp
          mkdir -p ci-cli-test && cd ci-cli-test
          echo "CI test artifact" > artifact.txt
          /tmp/cargo-target/release/axiom init
          /tmp/cargo-target/release/axiom key generate ci-key
          /tmp/cargo-target/release/axiom hash artifact.txt --json
          /tmp/cargo-target/release/axiom sign artifact.txt --key .axiom/keys/ci-key.key --out test.axm
          PUBKEY=$(grep public .axiom/keys/ci-key.key | cut -d' ' -f3)
          /tmp/cargo-target/release/axiom verify test.axm --pubkey "$PUBKEY"
          /tmp/cargo-target/release/axiom inspect test.axm
          /tmp/cargo-target/release/axiom lint test.axm
          /tmp/cargo-target/release/axiom doctor
          /tmp/cargo-target/release/axiom test

      - name: Built-in CLI test suite
        run: |
          /tmp/cargo-target/release/axiom test
          /tmp/cargo-target/release/axiom doctor
          /tmp/cargo-target/release/axiom benchmark

  python-conformance:
    runs-on: ubuntu-22.04
    needs: rust-build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build shared library
        run: cargo build --release -p axiom-core-ffi

      - name: Run Python conformance tests
        run: |
          export LD_LIBRARY_PATH="$CARGO_TARGET_DIR/release:$LD_LIBRARY_PATH"
          python3 scripts/differential_cbor_test.py

  fresh-clone-reproducibility:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Run fresh-clone reproducibility test
        run: bash scripts/fresh_clone_test.sh
