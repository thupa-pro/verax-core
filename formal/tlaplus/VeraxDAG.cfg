SPECIFICATION AxiomDAG

\* Model parameters
CONSTANTS
    MaxStatements = 5
    MaxIssuers = 3
    MaxTimestamp = 10
    PredicateAttests = 0
    PredicateAuthors = 1
    PredicateDerivedFrom = 2
    PredicateSupersedes = 3
    PredicateRevokes = 4
    PredicateEndorses = 5
    PredicateAppends = 6
    PredicateCompliesWith = 7

\* Invariants to check
INVARIANT
    InvAcyclic

INVARIANT
    InvRevocationIntegrity

INVARIANT
    InvTemporalMonotonicity

INVARIANT
    InvHashInjective

\* Action constraints
CONSTRAINT
    \* No duplicate statement hashes
    TRUE

\* Run TLC in exhaustive mode (bfs)
CHECK_DEADLOCK FALSE

\* Generate counterexample traces
ACTION_CONSTRAINT
    TRUE
